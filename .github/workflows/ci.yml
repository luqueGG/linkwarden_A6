name: CI

on:
  pull_request:
  push:
    branches: [main, dev]

jobs:
  build-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: linkwarden_test
        ports:
          - 5432:5432

        options: >-
          --health-cmd="pg_isready -U postgres -d linkwarden_test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/linkwarden_test

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable Corepack
        run: | 
          corepack enable
          corepack install

      - name: Install deps
        run: yarn install --immutable

      - name: Generate Prisma Client
        run: yarn prisma:generate

      - name: Apply Prisma migrations
        run: yarn prisma:deploy

      - name: Run tests
        run: yarn test
